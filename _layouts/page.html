---
layout: default
---
<main class="shell">
  <article style="padding: 64px 0; max-width: 720px; margin: 0 auto;">
    <h1 style="font-family: var(--serif); font-style: italic; font-weight: 350; font-size: clamp(48px, 6vw, 72px); letter-spacing: -0.02em; margin: 0 0 48px;">{{ page.title }}</h1>
    <div style="font-family: var(--serif); font-size: 19px; line-height: 1.72; color: var(--ink);">
      {{ content }}
    </div>
  </article>
</main>
