<header class="topbar" data-shell="topbar">
  <div class="shell topbar-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand-dot"></span>
      <span>Vish Sangale</span>
    </a>
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" {% if page.layout == 'home' %}class="is-active"{% endif %}>Home</a>
      <a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="is-active"{% endif %}>Research</a>
      <a href="{{ '/notes/' | relative_url }}" {% if page.url contains 'notes' %}class="is-active"{% endif %}>Notes</a>
      <a href="{{ '/photography/' | relative_url }}" {% if page.url contains 'photography' %}class="is-active"{% endif %}>Photography</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="is-active"{% endif %}>About</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="dot"></span><span id="themeLabel">light</span>
      </button>
    </nav>
  </div>
</header>
